<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OneNexsys Option C Globe</title>
<style>
  :root{
    --graphite:#0B0D10;
    --panel:#14181D;
    --panel2:#1F242B;
    --steel:#37414A;
    --silver:#A7B1BD;
    --emerald:#10B981;
    --emerald2:#34D399;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    min-height:100vh;
    display:grid;
    place-items:center;
    background:
      radial-gradient(circle at 62% 44%,rgba(16,185,129,.10),transparent 34%),
      linear-gradient(180deg,#0B0D10,#07090B);
    font-family:Inter,system-ui,sans-serif;
    color:white;
  }

  .stage{
    width:min(92vw,720px);
    aspect-ratio:1.18/1;
    border:1px solid rgba(167,177,189,.16);
    border-radius:18px;
    background:
      radial-gradient(circle at 68% 46%,rgba(16,185,129,.13),transparent 38%),
      linear-gradient(180deg,rgba(20,24,29,.68),rgba(11,13,16,.92));
    overflow:hidden;
    position:relative;
    box-shadow:0 34px 90px rgba(0,0,0,.55);
  }

  .stage::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(167,177,189,.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(167,177,189,.025) 1px,transparent 1px);
    background-size:34px 34px;
    mask-image:radial-gradient(circle at 68% 48%,black,transparent 75%);
  }

  .globe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    filter:drop-shadow(0 0 28px rgba(16,185,129,.20));
  }

  .sphere-shell{
    transform-origin:430px 252px;
    animation:verySlowTurn 90s linear infinite;
  }

  .foreground-links{
    transform-origin:430px 252px;
    animation:slowCounter 54s linear infinite;
  }

  .back-links{
    transform-origin:430px 252px;
    animation:slowTurn 68s linear infinite;
  }

  .node{
    transform-origin:center;
    animation:nodePulse 3.8s ease-in-out infinite;
  }

  .node:nth-child(2n){animation-delay:.55s}
  .node:nth-child(3n){animation-delay:1.15s}
  .node:nth-child(5n){animation-delay:1.65s}

  .signal{
    stroke-dasharray:8 320;
    stroke-dashoffset:0;
    animation:signalTravel 6.8s linear infinite;
  }

  .signal:nth-child(2){animation-delay:1.4s}
  .signal:nth-child(3){animation-delay:2.8s}

  @keyframes verySlowTurn{to{transform:rotate(360deg)}}
  @keyframes slowTurn{to{transform:rotate(360deg)}}
  @keyframes slowCounter{to{transform:rotate(-360deg)}}
  @keyframes signalTravel{to{stroke-dashoffset:-328}}
  @keyframes nodePulse{
    0%,100%{opacity:.72;transform:scale(1)}
    50%{opacity:1;transform:scale(1.32)}
  }
</style>
</head>
<body>
  <div class="stage">
    <svg class="globe" viewBox="0 0 720 560" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Option C animated emerald network globe">
      <defs>
        <radialGradient id="sphereFill" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#10B981" stop-opacity="0.16"/>
          <stop offset="42%" stop-color="#10B981" stop-opacity="0.06"/>
          <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
        </radialGradient>

        <radialGradient id="nodeFill" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#D1FAE5"/>
          <stop offset="36%" stop-color="#34D399"/>
          <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
        </radialGradient>

        <filter id="softGlow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <clipPath id="clipSphere">
          <circle cx="430" cy="252" r="168"/>
        </clipPath>
      </defs>

      <!-- base orbit platform -->
      <ellipse cx="430" cy="430" rx="230" ry="54" stroke="#10B981" stroke-opacity=".34"/>
      <ellipse cx="430" cy="430" rx="180" ry="40" stroke="#10B981" stroke-opacity=".22"/>
      <ellipse cx="430" cy="430" rx="126" ry="28" stroke="#10B981" stroke-opacity=".15"/>

      <!-- sphere body -->
      <circle cx="430" cy="252" r="168" fill="url(#sphereFill)" stroke="#10B981" stroke-opacity=".33"/>

      <!-- inner technical mesh -->
      <g class="sphere-shell" clip-path="url(#clipSphere)">
        <g stroke="#34D399" stroke-opacity=".13" stroke-width="1">
          <ellipse cx="430" cy="252" rx="168" ry="45"/>
          <ellipse cx="430" cy="252" rx="168" ry="86"/>
          <ellipse cx="430" cy="252" rx="168" ry="128"/>
          <ellipse cx="430" cy="252" rx="52" ry="168"/>
          <ellipse cx="430" cy="252" rx="98" ry="168"/>
          <line x1="262" y1="252" x2="598" y2="252"/>
          <line x1="430" y1="84" x2="430" y2="420"/>
        </g>

        <!-- dotted world texture, intentionally subtle -->
        <g fill="#A7B1BD" opacity=".36">
          <circle cx="348" cy="160" r="1.6"/><circle cx="362" cy="164" r="1.4"/><circle cx="376" cy="170" r="1.3"/><circle cx="390" cy="176" r="1.2"/>
          <circle cx="508" cy="160" r="1.6"/><circle cx="524" cy="168" r="1.4"/><circle cx="540" cy="178" r="1.3"/><circle cx="554" cy="190" r="1.2"/>
          <circle cx="326" cy="250" r="1.5"/><circle cx="342" cy="258" r="1.4"/><circle cx="358" cy="266" r="1.3"/><circle cx="374" cy="276" r="1.2"/>
          <circle cx="500" cy="315" r="1.6"/><circle cx="518" cy="322" r="1.4"/><circle cx="536" cy="330" r="1.3"/><circle cx="552" cy="340" r="1.2"/>
          <circle cx="400" cy="360" r="1.5"/><circle cx="416" cy="365" r="1.4"/><circle cx="432" cy="369" r="1.3"/><circle cx="448" cy="372" r="1.2"/>
        </g>
      </g>

      <!-- back network arcs -->
      <g class="back-links" stroke="#34D399" stroke-opacity=".26" stroke-width="1.05">
        <path d="M300 150C405 205 515 270 608 346"/>
        <path d="M318 380C370 205 516 118 608 168"/>
        <path d="M300 302C405 220 504 196 612 230"/>
        <path d="M332 104C442 210 458 326 420 410"/>
      </g>

      <!-- main clean connection arcs -->
      <g class="foreground-links" stroke="#10B981" stroke-opacity=".58" stroke-width="1.35">
        <path d="M286 202C366 96 528 98 610 252"/>
        <path d="M290 320C374 406 550 352 606 190"/>
        <path d="M318 278C410 186 516 174 620 248"/>
        <path d="M350 112C430 210 438 334 404 405"/>
      </g>

      <!-- moving highlights -->
      <g stroke="#34D399" stroke-opacity=".88" stroke-width="1.8" filter="url(#softGlow)">
        <path class="signal" d="M286 202C366 96 528 98 610 252"/>
        <path class="signal" d="M290 320C374 406 550 352 606 190"/>
        <path class="signal" d="M318 278C410 186 516 174 620 248"/>
      </g>

      <!-- emerald nodes -->
      <g filter="url(#softGlow)">
        <circle class="node" cx="330" cy="174" r="4.3" fill="url(#nodeFill)"/>
        <circle class="node" cx="512" cy="148" r="4.3" fill="url(#nodeFill)"/>
        <circle class="node" cx="590" cy="245" r="4.3" fill="url(#nodeFill)"/>
        <circle class="node" cx="548" cy="346" r="4.3" fill="url(#nodeFill)"/>
        <circle class="node" cx="416" cy="402" r="4.3" fill="url(#nodeFill)"/>
        <circle class="node" cx="314" cy="306" r="4.3" fill="url(#nodeFill)"/>
        <circle class="node" cx="294" cy="238" r="4.3" fill="url(#nodeFill)"/>
        <circle class="node" cx="430" cy="106" r="4.3" fill="url(#nodeFill)"/>
      </g>
    </svg>
  </div>
</body>
</html>
