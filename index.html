<!--
DROP-IN GLOBE REPLACEMENT

1. Save the generated globe image as:
   onenexsys-globe.png

2. Upload it to the same GitHub folder as index.html.

3. Replace your current <div class="globe-card">...</div> with the HTML below.

4. Add the CSS below inside your existing <style> tag, near the other .globe-card styles.
-->

<style>
  .globe-card {
    position: relative;
    min-height: 470px;
    border-radius: 18px;
    border: 1px solid rgba(167, 177, 189, 0.16);
    background:
      radial-gradient(circle at 68% 50%, rgba(16, 185, 129, 0.14), transparent 38%),
      linear-gradient(180deg, rgba(20, 24, 29, 0.72), rgba(11, 13, 16, 0.92));
    box-shadow: 0 34px 90px rgba(0, 0, 0, 0.55);
    overflow: hidden;
  }

  .globe-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(167, 177, 189, 0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(167, 177, 189, 0.022) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: radial-gradient(circle at 68% 48%, black, transparent 74%);
    pointer-events: none;
  }

  .globe-image-wrap {
    position: absolute;
    inset: -4% -3% -7% -3%;
    display: grid;
    place-items: center;
  }

  .globe-image {
    width: min(112%, 760px);
    height: auto;
    display: block;
    filter:
      drop-shadow(0 0 22px rgba(16, 185, 129, 0.24))
      drop-shadow(0 24px 60px rgba(0, 0, 0, 0.45));
    animation: globeFloat 7s ease-in-out infinite;
  }

  .globe-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 68% 45%, transparent 0 42%, rgba(11, 13, 16, 0.26) 78%),
      linear-gradient(90deg, rgba(11, 13, 16, 0.22), transparent 22%, transparent 78%, rgba(11, 13, 16, 0.22));
    pointer-events: none;
  }

  @keyframes globeFloat {
    0%, 100% {
      transform: translateY(0) scale(1);
    }
    50% {
      transform: translateY(-8px) scale(1.015);
    }
  }

  @media (max-width: 740px) {
    .globe-card {
      min-height: 380px;
    }

    .globe-image {
      width: 125%;
    }
  }
</style>

<div class="globe-card">
  <div class="globe-image-wrap">
    <img
      class="globe-image"
      src="onenexsys-globe.png"
      alt="Glowing emerald digital network globe representing OneNexsys infrastructure connectivity"
    />
  </div>
</div>
