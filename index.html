<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneNexsys | IT Infrastructure Solutions</title>
  <meta name="description" content="OneNexsys delivers secure, scalable and high-performance IT infrastructure solutions for modern businesses." />

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    :root {
      --bg: #020909;
      --bg-soft: #061413;
      --card: rgba(9, 24, 25, 0.82);
      --card-2: rgba(11, 28, 29, 0.74);
      --line: rgba(255, 255, 255, 0.11);
      --line-soft: rgba(255, 255, 255, 0.07);
      --green: #35e58e;
      --green-2: #19c978;
      --text: #f7fbfa;
      --muted: rgba(236, 248, 245, 0.72);
      --muted-2: rgba(236, 248, 245, 0.52);
      --max: 1160px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: #020909;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Grid Background Effect */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.88), transparent 82%);
    }

    a { color: inherit; text-decoration: none; }
    .container { width: min(100% - 76px, var(--max)); margin-inline: auto; }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(2, 8, 9, 0.86);
      border-bottom: 1px solid var(--line-soft);
      backdrop-filter: blur(18px);
    }

    .nav {
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    .brand { display: flex; align-items: center; gap: 13px; }
    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #45eb95, #17b96f);
      color: #04110d;
      font-weight: 950;
      font-size: 30px;
      box-shadow: 0 0 34px rgba(53,229,142,0.22);
    }

    .brand-text strong { display: block; font-size: 1.24rem; line-height: 1; letter-spacing: -0.055em; }
    .brand-text span { display: block; margin-top: 5px; font-size: 0.68rem; font-weight: 700; color: rgba(255,255,255,0.72); }

    .nav-links { display: flex; align-items: center; gap: 32px; font-size: 0.9rem; font-weight: 800; }
    .nav-links a:hover, .nav-links a.active { color: var(--green); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 23px;
      border-radius: 8px;
      font-size: 0.86rem;
      font-weight: 850;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .btn-primary { background: linear-gradient(135deg, #46e998, #22cd7a); color: #03120d; border: none; }
    .btn-secondary { border: 1px solid rgba(53,229,142,0.35); background: rgba(3, 13, 13, 0.35); color: #fff; }

    /* Hero Section */
    .hero { position: relative; min-height: 700px; padding: 80px 0; overflow: visible; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
    
    h1 { font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 1.1; margin-bottom: 24px; letter-spacing: -0.04em; }
    .accent { color: var(--green); }
    .hero-copy { color: var(--muted); font-size: 1.1rem; margin-bottom: 32px; max-width: 500px; }

    /* Interactive Globe Container */
    .hero-visual {
      position: relative;
      height: 600px;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #globe-container { width: 100%; height: 100%; cursor: grab; }
    #globe-container:active { cursor: grabbing; }

    /* 3D UI Elements */
    #globe-tooltip {
      position: fixed;
      background: var(--card);
      border: 1px solid var(--green);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .reset-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(9, 24, 25, 0.8);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 800;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s ease;
      z-index: 100;
    }

    .reset-btn.visible { opacity: 1; pointer-events: auto; }

    @media (max-width: 1024px) {
      .hero-grid { grid-template-columns: 1fr; text-align: center; }
      .hero-copy { margin-inline: auto; }
      .hero-visual { height: 450px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="container nav">
      <a href="#" class="brand">
        <span class="brand-mark">N</span>
        <span class="brand-text"><strong>OneNexsys</strong><span>Building Secure. Delivering Trust.</span></span>
      </a>
      <nav class="nav-links">
        <a href="#services">Services</a>
        <a href="#infrastructure">Infrastructure</a>
        <a href="mailto:contact@onenexsys.com" class="btn btn-secondary">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-content">
          <div style="color:var(--green); letter-spacing: 0.2em; font-weight: 900; margin-bottom: 1rem;">INFRASTRUCTURE 2.0</div>
          <h1>Powering Digital <span class="accent">Performance</span></h1>
          <p class="hero-copy">We deliver secure, scalable IT infrastructure. Click the nodes on our global network to explore our hubs.</p>
          <div style="display: flex; gap: 15px;">
            <button class="btn btn-primary">Explore Solutions</button>
            <button class="btn btn-secondary">View Network</button>
          </div>
        </div>

        <div class="hero-visual">
          <div id="globe-container"></div>
          <div id="globe-tooltip"></div>
          <button id="reset-view" class="reset-btn">↺ RESET CAMERA</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    // --- Configuration ---
    const locations = [
      { name: "New York Hub", lat: 40.7128, lon: -74.0060 },
      { name: "London Data Center", lat: 51.5074, lon: -0.1278 },
      { name: "Singapore Gateway", lat: 1.3521, lon: 103.8198 },
      { name: "Sydney Edge", lat: -33.8688, lon: 151.2093 },
      { name: "Tokyo Node", lat: 35.6762, lon: 139.6503 }
    ];

    const container = document.getElementById('globe-container');
    const tooltip = document.getElementById('globe-tooltip');
    const resetBtn = document.getElementById('reset-view');

    // --- Three.js Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.offsetWidth, container.offsetHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const globeRadius = 2.8;
    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // 1. Globe Point Cloud
    const globeGeo = new THREE.SphereGeometry(globeRadius, 50, 50);
    const globeMat = new THREE.PointsMaterial({
      color: 0x35e58e,
      size: 0.015,
      transparent: true,
      opacity: 0.6
    });
    const globePoints = new THREE.Points(globeGeo, globeMat);
    globeGroup.add(globePoints);

    // 2. Lat/Lon to Vector3 Helper
    function latLongToVector3(lat, lon, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    // 3. Add Markers & Arcs
    const markers = [];
    const arcs = [];
    const markerGeo = new THREE.SphereGeometry(0.06, 16, 16);
    const markerMat = new THREE.MeshBasicMaterial({ color: 0x35e58e });

    locations.forEach((loc, i) => {
      const pos = latLongToVector3(loc.lat, loc.lon, globeRadius);
      const marker = new THREE.Mesh(markerGeo, markerMat.clone());
      marker.position.copy(pos);
      marker.userData = { name: loc.name };
      
      // Hit Area for Raycaster
      const hitArea = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshBasicMaterial({ visible: false }));
      marker.add(hitArea);

      globeGroup.add(marker);
      markers.push(marker);

      // Create Arcs to the next location
      if (i < locations.length - 1) {
        const nextPos = latLongToVector3(locations[i+1].lat, locations[i+1].lon, globeRadius);
        const mid = new THREE.Vector3().addVectors(pos, nextPos).multiplyScalar(0.5).normalize().multiplyScalar(globeRadius + 0.5);
        const curve = new THREE.QuadraticBezierCurve3(pos, mid, nextPos);
        const points = curve.getPoints(50);
        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0x35e58e, transparent: true, opacity: 0.2 }));
        globeGroup.add(line);
      }
    });

    camera.position.z = 8;
    const controlsTarget = new THREE.Vector3(0, 0, 0);

    // --- Interaction Logic ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let isFlying = false;

    container.addEventListener('mousemove', (e) => {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / container.offsetWidth) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / container.offsetHeight) * 2 + 1;
      
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY + 15) + 'px';
    });

    container.addEventListener('click', () => {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(markers, true);

      if (intersects.length > 0) {
        const target = intersects[0].object.parent.type === "Mesh" ? intersects[0].object.parent : intersects[0].object;
        const targetPos = target.position.clone().normalize().multiplyScalar(8);
        
        isFlying = true;
        resetBtn.classList.add('visible');
        tooltip.style.display = 'block';
        tooltip.innerHTML = `<strong>NODE ACTIVE</strong><br>${target.userData.name || "System Core"}`;

        gsap.to(camera.position, { x: targetPos.x, y: targetPos.y, z: targetPos.z, duration: 1.5, ease: "power2.inOut" });
        gsap.to(controlsTarget, { 
          x: target.position.x, y: target.position.y, z: target.position.z, 
          duration: 1.5, onUpdate: () => camera.lookAt(controlsTarget) 
        });
      }
    });

    resetBtn.addEventListener('click', () => {
      isFlying = true;
      tooltip.style.display = 'none';
      gsap.to(camera.position, { x: 0, y: 0, z: 8, duration: 1.5, ease: "expo.inOut" });
      gsap.to(controlsTarget, { 
        x: 0, y: 0, z: 0, duration: 1.5, 
        onUpdate: () => camera.lookAt(controlsTarget),
        onComplete: () => { isFlying = false; resetBtn.classList.remove('visible'); }
      });
    });

    // --- Animation Loop ---
    function animate() {
      requestAnimationFrame(animate);
      if (!isFlying) {
        globeGroup.rotation.y += 0.002;
        camera.lookAt(0,0,0);
      }
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = container.offsetWidth / container.offsetHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.offsetWidth, container.offsetHeight);
    });

    animate();
  </script>
</body>
</html>
